<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .mono { font-family: 'Share Tech Mono', 'Courier New', monospace; }
    </style>
    <pattern id="scanlines" x="0" y="0" width="640" height="4" patternUnits="userSpaceOnUse">
      <rect width="640" height="2" fill="transparent"/>
      <rect y="2" width="640" height="2" fill="rgba(0,0,0,0.08)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="640" height="420" fill="#0a0a0a"/>
  <!-- Scanlines overlay -->
  <rect width="640" height="420" fill="url(#scanlines)"/>
  <!-- Border -->
  <rect x="1" y="1" width="638" height="418" fill="none" stroke="#33ff66" stroke-width="2"/>

  <!-- Status bar -->
  <text x="24" y="30" class="mono" font-size="10" fill="#22bb44" letter-spacing="1">PROFILE.SH v1.0</text>
  <text x="280" y="30" class="mono" font-size="10" fill="#22bb44" letter-spacing="1" text-anchor="middle">[ ONLINE ]</text>
  <text x="616" y="30" class="mono" font-size="10" fill="#22bb44" letter-spacing="1" text-anchor="end">TTY0</text>

  <!-- Divider under status bar -->
  <line x1="24" y1="38" x2="616" y2="38" stroke="#1a5c2a" stroke-width="1"/>

  <!-- Title -->
  <text x="24" y="72" font-family="'Courier New', monospace" font-size="32" fill="#33ff66" letter-spacing="3" font-weight="bold">ARTEMY ERKOV</text>
  <!-- Blinking cursor block -->
  <rect x="310" y="50" width="10" height="22" fill="#33ff66">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle -->
  <text x="24" y="95" class="mono" font-size="12" fill="#22bb44" letter-spacing="1">$ whoami — it specialist &amp; robotanica backend/mobile developer</text>

  <!-- Divider -->
  <line x1="24" y1="110" x2="616" y2="110" stroke="#1a5c2a" stroke-width="1"/>

  <!-- Role lines -->
  <text x="24" y="133" class="mono" font-size="13" fill="#22bb44">&#9788;</text>
  <text x="44" y="133" class="mono" font-size="13" fill="#33ff66">IT Specialist @ bkgroup.pro</text>

  <text x="24" y="155" class="mono" font-size="13" fill="#22bb44">&#9790;</text>
  <text x="44" y="155" class="mono" font-size="13" fill="#33ff66">Backend / Mobile Developer @ Robotanica</text>

  <!-- Divider -->
  <line x1="24" y1="170" x2="616" y2="170" stroke="#1a5c2a" stroke-width="1"/>

  <!-- Daily stack section -->
  <text x="24" y="193" class="mono" font-size="11" fill="#22bb44" letter-spacing="3">// DAILY STACK</text>

  <!-- Tags -->
  <rect x="24" y="202" width="36" height="22" fill="none" stroke="#1a5c2a" stroke-width="1"/>
  <text x="42" y="217" class="mono" font-size="11" fill="#33ff66" text-anchor="middle" letter-spacing="1">.py</text>

  <rect x="68" y="202" width="46" height="22" fill="none" stroke="#1a5c2a" stroke-width="1"/>
  <text x="91" y="217" class="mono" font-size="11" fill="#33ff66" text-anchor="middle" letter-spacing="1">.dart</text>

  <rect x="122" y="202" width="36" height="22" fill="none" stroke="#1a5c2a" stroke-width="1"/>
  <text x="140" y="217" class="mono" font-size="11" fill="#33ff66" text-anchor="middle" letter-spacing="1">.cs</text>

  <!-- Divider -->
  <line x1="24" y1="238" x2="616" y2="238" stroke="#1a5c2a" stroke-width="1"/>

  <!-- Contributed section -->
  <text x="24" y="261" class="mono" font-size="11" fill="#22bb44" letter-spacing="3">// CONTRIBUTED</text>

  <text x="24" y="282" class="mono" font-size="13" fill="#22bb44">*</text>
  <text x="40" y="282" class="mono" font-size="13" fill="#33ff66">Robotanica</text>

  <text x="24" y="304" class="mono" font-size="13" fill="#22bb44">*</text>
  <text x="40" y="304" class="mono" font-size="13" fill="#33ff66">LEGOcy</text>

  <!-- Divider -->
  <line x1="24" y1="320" x2="616" y2="320" stroke="#1a5c2a" stroke-width="1"/>

  <!-- Ping line -->
  <text x="24" y="343" class="mono" font-size="12" fill="#22bb44" letter-spacing="1">$ ping me about:</text>
  <text x="24" y="362" class="mono" font-size="12" fill="#66ffaa" letter-spacing="1">  AI workflows · augmented reality · cross-platform mobile apps</text>
  <text x="24" y="381" class="mono" font-size="12" fill="#66ffaa" letter-spacing="1">  drafting · analytics</text>

  <!-- Bottom border line -->
  <line x1="24" y1="395" x2="616" y2="395" stroke="#1a5c2a" stroke-width="1"/>
  <text x="24" y="411" class="mono" font-size="10" fill="#22bb44" letter-spacing="1">[ EOF ]</text>
</svg>
